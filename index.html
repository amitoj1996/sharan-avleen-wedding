            gold: { 50:'#fdfaef',100:'#faf2d0',200:'#f4e29d',300:'#edce6a',400:'#D4A855',500:'#d4a037',600:'#b8822a',700:'#956224',800:'#7a4f24',900:'#664221' },
            cream: { 50:'#FFFDF7',100:'#FDF5E6',200:'#faecd0',300:'#f5ddb0' },

          }
        }
      }
    }

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

  <style>
    html.lenis, html.lenis body { height:auto; }
    .lenis.lenis-smooth { scroll-behavior:auto!important; }
    body { font-family:'Cormorant Garamond',Georgia,serif; overflow-x:hidden; }

    /* Custom cursor */
    .cursor-dot {
      position:fixed; top:0; left:0; width:8px; height:8px;
      background:#D4A855; border-radius:50%; pointer-events:none;
      z-index:9999; mix-blend-mode:difference;
      transition: width 0.3s, height 0.3s, margin 0.3s;
    }
    .cursor-dot.hover { width:40px; height:40px; margin:-16px 0 0 -16px; background:rgba(212,168,85,0.3); border:1px solid #D4A855; }
    @media(max-width:768px) { .cursor-dot { display:none; } }

    /* Scroll progress */
    #scrollProgress { height:2px; background:linear-gradient(90deg,#D4A855,#edce6a,#D4A855); transition:width 30ms linear; }

    /* Film grain noise overlay */
    .grain-overlay::after {
      content:''; position:fixed; inset:0; z-index:100; pointer-events:none;
      opacity:0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat: repeat;
      background-size: 256px 256px;
    }

    /* Floating gradient orbs */
    .orb {
      position:fixed; border-radius:50%; pointer-events:none; z-index:0;
      filter: blur(80px);
      opacity: 0.12;
      will-change: transform;
    }
    .orb-1 {
      width:500px; height:500px; top:-10%; left:-10%;
      background: radial-gradient(circle, #D4A855, transparent 70%);
      animation: orbFloat1 25s ease-in-out infinite;
    }
    .orb-2 {
      width:400px; height:400px; top:30%; right:-15%;
      background: radial-gradient(circle, #9B1B30, transparent 70%);
      animation: orbFloat2 30s ease-in-out infinite;
    }
    .orb-3 {
      width:350px; height:350px; bottom:10%; left:20%;
      background: radial-gradient(circle, #7B1E3A, transparent 70%);
      animation: orbFloat3 20s ease-in-out infinite;
    }
    .orb-4 {
      width:300px; height:300px; top:60%; left:50%;
      background: radial-gradient(circle, #D4A855, transparent 70%);
      animation: orbFloat4 35s ease-in-out infinite;
      opacity: 0.08;
    }
    @keyframes orbFloat1 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(80px,60px) scale(1.1); }
      50% { transform: translate(30px,120px) scale(0.95); }
      75% { transform: translate(-40px,40px) scale(1.05); }
    }
    @keyframes orbFloat2 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-60px,80px) scale(1.08); }
      50% { transform: translate(-100px,20px) scale(0.92); }
      75% { transform: translate(-30px,-50px) scale(1.05); }
    }
    @keyframes orbFloat3 {
      0%,100% { transform: translate(0,0) scale(1); }
      33% { transform: translate(50px,-70px) scale(1.1); }
      66% { transform: translate(-40px,-30px) scale(0.9); }
    }
    @keyframes orbFloat4 {
      0%,100% { transform: translate(0,0) scale(1); }
      25% { transform: translate(-70px,-50px) scale(1.15); }
      50% { transform: translate(40px,-90px) scale(0.85); }
      75% { transform: translate(60px,30px) scale(1.1); }
    }

    /* Section glow - radial gold glow behind headings */
    .section-glow {
      position: relative;
    }
    .section-glow::before {
      content:''; position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
      width:400px; height:400px;
      background: radial-gradient(circle, rgba(212,168,85,0.08) 0%, transparent 70%);
      pointer-events:none; z-index:0;
    }

    /* Shimmer line effect */
    @keyframes shimmerLine {
      0% { transform: translateX(-100%); }
      100% { transform: translateX(100%); }
    }
    .shimmer-line {
      position:relative; overflow:hidden;
    }
    .shimmer-line::after {
      content:''; position:absolute; inset:0;
      background: linear-gradient(90deg, transparent, rgba(212,168,85,0.15), transparent);
      animation: shimmerLine 4s ease-in-out infinite;
    }

    @media(prefers-reduced-motion:reduce) {
      .orb { display:none; }
      .shimmer-line::after { animation:none; }
      .grain-overlay::after { display:none; }
    }

    /* Damask texture */
    .damask-bg {
      background-color: #FDF5E6;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a855' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Hero - dark editorial */
    .hero-image { object-fit:cover; object-position:center top; }

    /* Gold shimmer */
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .gold-shimmer {
      background:linear-gradient(90deg,#D4A855 0%,#f5e6b8 20%,#D4A855 40%,#f5e6b8 60%,#D4A855 80%,#f5e6b8 100%);
      background-size:200% auto; -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; animation:shimmer 8s linear infinite;
    }

    /* Ornate divider */
    .ornate-divider { display:flex; align-items:center; gap:16px; }
    .ornate-divider::before,.ornate-divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,#D4A855,transparent); }

    /* Mandala */
    @keyframes rotateSlow { 0%{transform:rotate(0deg)} 100%{transform:rotate(360deg)} }
    .mandala-spin { animation: rotateSlow 80s linear infinite; }

    /* Scroll indicator */
    @keyframes bounce { 0%,100%{transform:translateY(0)} 50%{transform:translateY(10px)} }
    .scroll-indicator { animation: bounce 2s infinite; }

    /* Nav */
    .event-nav { -ms-overflow-style:none; scrollbar-width:none; }
    .event-nav::-webkit-scrollbar { display:none; }
    .nav-pill { transition:all 0.3s ease; }
    .nav-pill.active { background:linear-gradient(135deg,#7B1E3A,#9B1B30); color:white; box-shadow:0 2px 10px rgba(123,30,58,0.3); }

    /* Side toggle */
    .side-btn { transition:all 0.3s ease; }
    .side-btn.active { background:linear-gradient(135deg,#7B1E3A,#9B1B30); color:white; box-shadow:0 4px 15px rgba(123,30,58,0.3); }

    /* Bento Grid - no cropping, photos show in full */
    .bento {
      column-count: 2; column-gap: 10px;
    }
    @media(min-width:768px) { .bento { column-count: 3; column-gap: 14px; } }
    .bento-item {
      break-inside: avoid; margin-bottom: 10px;
      border-radius: 8px; overflow: hidden;
    }
    @media(min-width:768px) { .bento-item { margin-bottom: 14px; } }

    /* Photo card */
    .photo-card {
      position:relative; overflow:hidden; border-radius:8px; cursor:pointer;
    }
    .photo-card img { transition: transform 1s cubic-bezier(0.25,0.46,0.45,0.94); }
    .photo-card:hover img { transform: scale(1.1); }
    .photo-card .overlay {
      position:absolute; inset:0;
      background: linear-gradient(to top, rgba(123,30,58,0.7) 0%, transparent 60%);
      opacity:0; transition: opacity 0.5s ease;
    }
    .photo-card:hover .overlay { opacity:1; }
    .photo-card .overlay-text {
      position:absolute; bottom:16px; right:16px;
      color:white; opacity:0; transform:translateY(10px);
      transition: all 0.5s ease 0.1s;
    }
    .photo-card:hover .overlay-text { opacity:1; transform:translateY(0); }
    .photo-card:hover { box-shadow: 0 20px 50px rgba(123,30,58,0.15), 0 0 0 2px rgba(212,168,85,0.4); }

    /* Carousel */
    .carousel { display:flex; gap:16px; overflow-x:auto; scroll-snap-type:x mandatory; -ms-overflow-style:none; scrollbar-width:none; padding:8px 0; }
    .carousel::-webkit-scrollbar { display:none; }
    .carousel-item { flex:0 0 auto; scroll-snap-align:center; width:280px; height:190px; border-radius:12px; overflow:hidden; transition:transform 0.4s ease; }
    @media(min-width:768px) { .carousel-item { width:380px; height:255px; } }
    .carousel-item:hover { transform:scale(1.03); }

    /* Title line */
    .title-line { width:0; height:1px; background:linear-gradient(90deg,transparent,#D4A855,transparent); }

    /* Counter */
    .counter-num { font-variant-numeric:tabular-nums; }

    /* Section quote */
    .section-quote { position:relative; padding:0 2rem; }
    .section-quote::before { content:'\201C'; position:absolute; top:-20px; left:0; font-family:'Playfair Display'; font-size:4rem; color:rgba(212,168,85,0.15); line-height:1; }

    /* Lightbox */
    #lightbox { backdrop-filter:blur(20px); }
    .lb-enter { animation: lbZoom 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes lbZoom { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* Music */
    .music-btn {
      position:fixed; bottom:24px; right:24px; z-index:150;
      width:52px; height:52px; border-radius:50%;
      background:linear-gradient(135deg,#7B1E3A,#9B1B30);
      border:2px solid rgba(212,168,85,0.4);
      display:flex; align-items:center; justify-content:center;
      cursor:pointer; box-shadow:0 4px 20px rgba(123,30,58,0.4);
      transition:all 0.3s ease;
    }
    .music-btn:hover { transform:scale(1.1); box-shadow:0 6px 30px rgba(123,30,58,0.5); border-color:rgba(212,168,85,0.7); }
    .eq-bar { display:inline-block; width:3px; background:#D4A855; border-radius:2px; margin:0 1.5px; vertical-align:bottom; }
    .music-playing .eq-bar { animation:eqBounce 0.6s ease-in-out infinite alternate; }
    .eq-bar:nth-child(1){height:6px;animation-delay:0s} .eq-bar:nth-child(2){height:12px;animation-delay:0.12s}
    .eq-bar:nth-child(3){height:8px;animation-delay:0.24s} .eq-bar:nth-child(4){height:14px;animation-delay:0.08s}
    .eq-bar:nth-child(5){height:5px;animation-delay:0.2s}
    @keyframes eqBounce { 0%{height:3px} 100%{height:16px} }
    .music-paused .eq-bar { animation:none; height:3px!important; }
    .music-tooltip {
      position:absolute; right:62px; top:50%; transform:translateY(-50%);
      background:rgba(26,10,10,0.9); color:#D4A855; font-family:Poppins; font-size:10px;
      letter-spacing:0.1em; padding:6px 14px; border-radius:20px; white-space:nowrap;
      opacity:0; pointer-events:none; transition:opacity 0.3s; border:1px solid rgba(212,168,85,0.2);
    }
    .music-btn:hover .music-tooltip { opacity:1; }

    @media(prefers-reduced-motion:reduce) {
      .cursor-dot{display:none} .gold-shimmer,.mandala-spin,.scroll-indicator{animation:none}
      .music-playing .eq-bar{animation:none} .photo-card img{transition:none}
    }
  </style>
</head>

<body class="damask-bg text-gray-900 grain-overlay">
  <script>

  function animateHero() {

      .fromTo('#heroScroll',{opacity:0},{opacity:1,duration:0.6},2.3);

  // ============================================================
  // RENDER (warm cream style sections)
  // ============================================================
  const activeSides = {};

  function render() {
    const c = document.getElementById('eventsContainer');
    c.innerHTML = CFG.events.map(ev => {
      const hasG=ev.sides.girl!==null, hasB=ev.sides.boy!==null, hasBoth=hasG&&hasB;
      const def = hasG ? 'girl' : 'boy';
      activeSides[ev.id] = def;

      return `
        <section id="${ev.id}" class="mb-32 md:mb-44 scroll-mt-20">
          <div class="text-center mb-14 md:mb-18 section-glow">
            <span class="section-icon mb-5 flex justify-center">${ev.icon}</span>
            <h2 class="section-title font-display text-5xl md:text-8xl lg:text-9xl text-burgundy-800 font-black mb-4 relative z-10" style="line-height:0.85">${ev.name}</h2>
            <div class="title-line shimmer-line mx-auto mb-4"></div>
            <p class="section-date font-ui text-[9px] md:text-[10px] text-gold-600/70 tracking-[0.3em] uppercase mb-5">${ev.date}</p>
            <div class="ornate-divider w-32 md:w-48 mx-auto mb-5">
              <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#D4A855"/></svg>
            </div>
            <p class="section-desc section-quote font-body text-lg md:text-xl text-burgundy-700/40 italic max-w-md mx-auto">${ev.desc}</p>
            <p class="section-count font-ui text-[10px] text-gold-500/40 tracking-[0.2em] uppercase mt-5"><span class="counter-num" data-target="${ev.count}">0</span> photos captured</p>
          </div>

          ${hasBoth ? `
          <div class="flex justify-center gap-3 mb-12 side-toggle-wrap">
            <button onclick="toggleSide('${ev.id}','girl')" class="side-btn ${def==='girl'?'active':'bg-cream-200/60 text-burgundy-800 border border-gold-400/15'} px-7 py-2.5 rounded-full font-ui text-[10px] font-medium tracking-[0.15em] uppercase">Avleen's Side</button>
            <button onclick="toggleSide('${ev.id}','boy')" class="side-btn ${def==='boy'?'active':'bg-cream-200/60 text-burgundy-800 border border-gold-400/15'} px-7 py-2.5 rounded-full font-ui text-[10px] font-medium tracking-[0.15em] uppercase">Sharan's Side</button>
          </div>` : ''}

          <div id="${ev.id}-girl" class="${!hasG||def!=='girl'?'hidden':''}">${hasG?renderSide(ev,'girl'):''}</div>
          <div id="${ev.id}-boy" class="${!hasB||def!=='boy'?'hidden':''}">${hasB?renderSide(ev,'boy'):''}</div>
        </section>
      `;
    }).join('');
  }

  function renderSide(ev, side) {
    const d = ev.sides[side];
    const sideName = side==='girl'?"Avleen's":"Sharan's";
    if (!d.photos.length) return '<div class="text-center py-20"><p class="font-body text-lg text-burgundy-700/30 italic">Gallery coming soon</p></div>';

    const layouts = ['bento-a','bento-b','bento-c'];
    const layoutIdx = CFG.events.findIndex(e => e.id === ev.id);
    const bentoClass = layouts[layoutIdx % 3];

    return `
      <div class="space-y-10">
        <div class="bento">
          ${d.photos.slice(0,6).map((p,i) => `
            <div class="bento-item">
              <div class="photo-card" onclick="openLightbox('${ev.id}','${side}',${i})" data-speed="${0.95+Math.random()*0.1}">
                <img src="${p.src}" alt="${ev.name}" loading="lazy" decoding="async" class="w-full block">
                <div class="overlay"></div>
                <div class="overlay-text">
                  <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5"><path d="M15 3h6v6M14 10l6.1-6.1M9 21H3v-6M10 14l-6.1 6.1"/></svg>
                </div>
              </div>
            </div>
          `).join('')}
        </div>

        ${d.link && d.link!=='#' ? `
        <div class="text-center pt-6 flex flex-col sm:flex-row items-center justify-center gap-3">
          <a href="event-gallery.html?event=${ev.id}&side=${side}"
             class="group inline-flex items-center gap-2.5 px-8 py-3.5 rounded-full bg-gradient-to-r from-gold-400 to-gold-500 text-burgundy-950 font-ui text-[10px] font-semibold tracking-[0.15em] uppercase shadow-lg hover:shadow-xl hover:from-gold-300 hover:to-gold-400 transition-all duration-300">
            <span>View All ${sideName} Photos</span>
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="group-hover:translate-x-1 transition-transform"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
          </a>
          <a href="event-gallery.html?event=${ev.id}&side=${side}&type=videos"
             class="group inline-flex items-center gap-2.5 px-8 py-3.5 rounded-full bg-burgundy-800/90 text-cream-100 font-ui text-[10px] font-semibold tracking-[0.15em] uppercase shadow-lg hover:shadow-xl hover:bg-burgundy-700 transition-all duration-300">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="currentColor"><path d="M8 5v14l11-7z"/></svg>
            <span>View All ${sideName} Videos</span>
          </a>
        </div>` : ''}
      </div>
    `;
  }

  // ============================================================
  // GSAP SCROLL ANIMATIONS
  // ============================================================
  function initAnimations() {
    CFG.events.forEach(ev => {
      const s = document.getElementById(ev.id);
      if (!s) return;

      gsap.fromTo(s.querySelector('.section-icon'),{scale:0,rotation:-20,opacity:0},{scale:1,rotation:0,opacity:1,duration:0.8,ease:'back.out(2)',scrollTrigger:{trigger:s,start:'top 80%'}});
      gsap.fromTo(s.querySelector('.section-title'),{y:60,opacity:0,filter:'blur(6px)'},{y:0,opacity:1,filter:'blur(0px)',duration:1,ease:'power3.out',scrollTrigger:{trigger:s,start:'top 78%'}});
      gsap.to(s.querySelector('.title-line'),{width:'120px',duration:1.2,ease:'power2.inOut',scrollTrigger:{trigger:s,start:'top 75%'}});
      gsap.fromTo(s.querySelector('.section-date'),{y:20,opacity:0},{y:0,opacity:1,duration:0.8,delay:0.3,scrollTrigger:{trigger:s,start:'top 75%'}});
      gsap.fromTo(s.querySelector('.section-desc'),{y:20,opacity:0},{y:0,opacity:1,duration:0.8,delay:0.5,scrollTrigger:{trigger:s,start:'top 75%'}});

      const ce = s.querySelector('.counter-num');
      if (ce) {
        const target = parseInt(ce.dataset.target);
        gsap.fromTo(s.querySelector('.section-count'),{opacity:0},{opacity:1,duration:0.5,delay:0.6,scrollTrigger:{trigger:s,start:'top 75%'}});
        const counter = {val:0};
        gsap.to(counter,{val:target,duration:2,ease:'power2.out',scrollTrigger:{trigger:s,start:'top 70%'},onUpdate:()=>{ce.textContent=Math.round(counter.val).toLocaleString();}});
      }

      const tw = s.querySelector('.side-toggle-wrap');
      if (tw) gsap.fromTo(tw,{y:20,opacity:0},{y:0,opacity:1,duration:0.6,delay:0.7,scrollTrigger:{trigger:s,start:'top 70%'}});

      s.querySelectorAll('.photo-card').forEach((card,i) => {
        gsap.fromTo(card,{clipPath:'inset(100% 0 0 0)',opacity:0},{clipPath:'inset(0% 0 0 0)',opacity:1,duration:1,ease:'power3.inOut',scrollTrigger:{trigger:card,start:'top 90%'},delay:i*0.08});
      });

      s.querySelectorAll('.carousel-item').forEach((item,i) => {
        gsap.fromTo(item,{x:80,opacity:0,scale:0.9},{x:0,opacity:1,scale:1,duration:0.8,ease:'power2.out',scrollTrigger:{trigger:item,start:'top 95%'},delay:i*0.1});
      });

      s.querySelectorAll('.photo-card').forEach(card => {
        const speed = parseFloat(card.dataset.speed) || 1;
        gsap.to(card,{yPercent:(1-speed)*30,ease:'none',scrollTrigger:{trigger:card,start:'top bottom',end:'bottom top',scrub:2}});
      });
    });
  }

  // ============================================================
  // NAV + SIDE TOGGLE + LIGHTBOX + PROGRESS
  // ============================================================
  function scrollToEvent(id) { lenis.scrollTo('#'+id,{offset:-60}); }

  const navObs = new IntersectionObserver(entries=>{
    entries.forEach(e=>{
      if(e.isIntersecting){
        document.querySelectorAll('.nav-pill').forEach(p=>{
          const a=p.dataset.event===e.target.id;
          p.classList.toggle('active',a);
          p.classList.toggle('bg-cream-200/70',!a);
        });
        document.querySelector(`.nav-pill[data-event="${e.target.id}"]`)?.scrollIntoView({behavior:'smooth',block:'nearest',inline:'center'});
      }
    });
  },{threshold:0.15,rootMargin:'-80px 0px -40% 0px'});

  function toggleSide(eid,side){
    activeSides[eid]=side;
    const g=document.getElementById(`${eid}-girl`),b=document.getElementById(`${eid}-boy`);
    if(g) g.classList.toggle('hidden',side!=='girl');
    if(b) b.classList.toggle('hidden',side!=='boy');
    document.getElementById(eid).querySelectorAll('.side-btn').forEach(btn=>{
      const isG=btn.textContent.includes('Avleen'),isA=(isG&&side==='girl')||(!isG&&side==='boy');
      btn.classList.toggle('active',isA);
      btn.classList.toggle('bg-cream-200/60',!isA);
      btn.classList.toggle('text-burgundy-800',!isA);
      btn.classList.toggle('border',!isA);
      btn.classList.toggle('border-gold-400/15',!isA);
    });
    document.getElementById(`${eid}-${side}`)?.querySelectorAll('.photo-card').forEach((c,i)=>{
      gsap.fromTo(c,{clipPath:'inset(100% 0 0 0)',opacity:0},{clipPath:'inset(0% 0 0 0)',opacity:1,duration:0.8,ease:'power3.inOut',delay:i*0.08});
    });
  }

  let lbP=[],lbI=0;
  function openLightbox(eid,side,idx){lbP=CFG.events.find(e=>e.id===eid).sides[side].photos;lbI=idx;updateLb();const lb=document.getElementById('lightbox');lb.classList.remove('hidden');lb.classList.add('flex');document.body.style.overflow='hidden';lenis.stop();}
  function closeLightbox(e){if(e&&e.target!==e.currentTarget)return;const lb=document.getElementById('lightbox');lb.classList.add('hidden');lb.classList.remove('flex');document.body.style.overflow='';lenis.start();}
  function lightboxNav(d){lbI=(lbI+d+lbP.length)%lbP.length;updateLb();}
  function updateLb(){const p=lbP[lbI],img=document.getElementById('lightboxImg');img.classList.remove('lb-enter');img.style.opacity=0;setTimeout(()=>{img.src=p.src;img.classList.add('lb-enter');img.style.opacity=1;},80);document.getElementById('lightboxCounter').textContent=`${lbI+1} / ${lbP.length}`;[-1,1].forEach(o=>{const i=(lbI+o+lbP.length)%lbP.length;new Image().src=lbP[i].src;});}
  document.addEventListener('keydown',e=>{if(document.getElementById('lightbox').classList.contains('hidden'))return;if(e.key==='Escape')closeLightbox();if(e.key==='ArrowLeft')lightboxNav(-1);if(e.key==='ArrowRight')lightboxNav(1);});
  let tx=0;
  document.getElementById('lightbox').addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});
  document.getElementById('lightbox').addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50)lightboxNav(d>0?-1:1);},{passive:true});

  function updateProgress(){const h=document.documentElement.scrollHeight-window.innerHeight;document.getElementById('scrollProgress').style.width=(h>0?(window.scrollY/h)*100:0)+'%';}

  // ============================================================
  // MUSIC
  // ============================================================
  let ytPlayer=null,musicPlaying=false;
  const musicPaused = sessionStorage.getItem('musicPaused') === 'true';
  const ytS=document.createElement('script');ytS.src='https://www.youtube.com/iframe_api';document.head.appendChild(ytS);
  window.onYouTubeIframeAPIReady=function(){ytPlayer=new YT.Player('ytPlayer',{height:'0',width:'0',videoId:'AGsn2ycFRqI',playerVars:{autoplay:musicPaused?0:1,loop:1,playlist:'AGsn2ycFRqI',controls:0},events:{onReady:()=>{ytPlayer.setVolume(35);if(!musicPaused){ytPlayer.playVideo();musicPlaying=true;const btn=document.getElementById('musicBtn');btn.classList.remove('music-paused');btn.classList.add('music-playing');btn.querySelector('.music-tooltip').textContent='Pause Music';}else{musicPlaying=false;const btn=document.getElementById('musicBtn');btn.classList.remove('music-playing');btn.classList.add('music-paused');btn.querySelector('.music-tooltip').textContent='Play Music';}},onStateChange:e=>{if(e.data===YT.PlayerState.ENDED)ytPlayer.playVideo();}}});};
  function toggleMusic(){if(!ytPlayer||typeof ytPlayer.getPlayerState!=='function')return;const btn=document.getElementById('musicBtn'),tt=btn.querySelector('.music-tooltip');if(musicPlaying){ytPlayer.pauseVideo();musicPlaying=false;btn.classList.remove('music-playing');btn.classList.add('music-paused');tt.textContent='Play Music';sessionStorage.setItem('musicPaused','true');}else{ytPlayer.playVideo();musicPlaying=true;btn.classList.remove('music-paused');btn.classList.add('music-playing');tt.textContent='Pause Music';sessionStorage.setItem('musicPaused','false');}}

  // ============================================================
  // INIT
  // ============================================================
  // Prevent browser's automatic scroll restoration — we handle it ourselves
  if ('scrollRestoration' in history) {
    history.scrollRestoration = 'manual';
  }

  // Save scroll position when navigating away
  document.addEventListener('click', e => {
    const link = e.target.closest('a[href]');
    if (link && !link.getAttribute('href').startsWith('#') && !link.getAttribute('target')) {
      sessionStorage.setItem('galleryScrollY', window.scrollY.toString());
    }
  });

  document.addEventListener('DOMContentLoaded',()=>{
    render();
    animateHero();
    initAnimations();
    CFG.events.forEach(e=>{const s=document.getElementById(e.id);if(s)navObs.observe(s);});
    window.addEventListener('scroll',updateProgress,{passive:true});
    updateProgress();

    // Restore scroll position if returning from a sub-page
    const savedY = sessionStorage.getItem('galleryScrollY');
    if (savedY) {
      const y = parseInt(savedY);
      // Immediately scroll — no animation, no delay
      window.scrollTo(0, y);
      // Also set it again after a tiny delay in case layout shifts
      setTimeout(() => window.scrollTo(0, y), 50);
      sessionStorage.removeItem('galleryScrollY');
    }

    // Orb parallax on scroll
    document.querySelectorAll('.orb').forEach((orb,i) => {
      gsap.to(orb, {
        yPercent: (i%2===0 ? -15 : 15) * (i+1),
        ease:'none',
        scrollTrigger:{ trigger:'body', start:'top top', end:'bottom bottom', scrub:3 }
      });
    });

    // Section glow pulse on enter
    document.querySelectorAll('.section-glow').forEach(glow => {
      gsap.fromTo(glow,
        { '--glow-scale': 0.5 },
        { '--glow-scale': 1, duration: 1.5, ease:'power2.out',
          scrollTrigger:{ trigger:glow, start:'top 80%' }
        });
    });
  });
  </script>
</body>
</html>
