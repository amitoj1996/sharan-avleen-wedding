<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Photos — Avleen & Sharan Wedding</title>
  <meta name="description" content="Find your photos from Avleen & Sharan's wedding using face recognition">
  <meta name="theme-color" content="#7B1E3A">
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            burgundy: { 50:'#fdf2f4',100:'#fce7eb',200:'#f9d0d9',300:'#f4a9ba',400:'#ec7696',500:'#df4b74',600:'#c9295a',700:'#a91d49',800:'#7B1E3A',900:'#6b1a33',950:'#3d0a1a' },
            gold: { 50:'#fdfaef',100:'#faf2d0',200:'#f4e29d',300:'#edce6a',400:'#D4A855',500:'#d4a037',600:'#b8822a',700:'#956224',800:'#7a4f24',900:'#664221' },
            cream: { 50:'#FFFDF7',100:'#FDF5E6',200:'#faecd0',300:'#f5ddb0' },
          },
          fontFamily: {
            display: ['"Playfair Display"','Georgia','serif'],
            body: ['"Cormorant Garamond"','Georgia','serif'],
            ui: ['Poppins','system-ui','sans-serif']
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="preconnect" href="https://cdn.jsdelivr.net" crossorigin>
  <link rel="preconnect" href="https://unpkg.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

  <style>
    html.lenis, html.lenis body { height:auto; }
    .lenis.lenis-smooth { scroll-behavior:auto!important; }
    body { font-family:'Cormorant Garamond',Georgia,serif; overflow-x:hidden; }

    /* Damask */
    .damask-bg {
      background-color: #FDF5E6;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a855' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Grain */
    .grain-overlay::after {
      content:''; position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat; background-size:256px 256px;
    }

    /* Floating orbs */
    .orb { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(80px); opacity:0.1; will-change:transform; }
    .orb-1 { width:400px; height:400px; top:-5%; right:-10%; background:radial-gradient(circle,#D4A855,transparent 70%); animation:orbF1 25s ease-in-out infinite; }
    .orb-2 { width:350px; height:350px; bottom:10%; left:-10%; background:radial-gradient(circle,#7B1E3A,transparent 70%); animation:orbF2 30s ease-in-out infinite; }
    @keyframes orbF1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,80px)} }
    @keyframes orbF2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-60px)} }

    /* Ornate divider */
    .ornate-divider { display:flex; align-items:center; gap:16px; }
    .ornate-divider::before,.ornate-divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,#D4A855,transparent); }

    /* Gold shimmer */
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .gold-shimmer {
      background:linear-gradient(90deg,#D4A855 0%,#f5e6b8 20%,#D4A855 40%,#f5e6b8 60%,#D4A855 80%);
      background-size:200% auto; -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; animation:shimmer 8s linear infinite;
    }

    /* Face card */
    .face-card {
      cursor:pointer; transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
      touch-action: manipulation; /* Removes 300ms tap delay on mobile */
    }
    .face-card:hover { transform:translateY(-6px) scale(1.05); }
    .face-card:hover .face-img { border-color:rgba(212,168,85,0.8); box-shadow:0 0 30px rgba(212,168,85,0.2); }
    .face-card.selected .face-img { border-color:#7B1E3A !important; border-width:3px !important; box-shadow:0 0 20px rgba(123,30,58,0.3); }
    .face-img {
      border: 2px solid rgba(212,168,85,0.25);
      transition: all 0.4s ease;
    }

    /* Photo card */
    .photo-card { position:relative; overflow:hidden; border-radius:8px; cursor:pointer; }
    .photo-card img { transition:transform 1s cubic-bezier(0.25,0.46,0.45,0.94); }
    .photo-card:hover img { transform:scale(1.08); }
    .photo-card .overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(123,30,58,0.6) 0%, transparent 50%);
      opacity:0; transition:opacity 0.5s ease;
    }
    .photo-card:hover .overlay { opacity:1; }

    /* JS-positioned masonry — absolute positioning eliminates row-height gaps */
    .masonry {
      position: relative;
    }
    .masonry-item {
      position: absolute;
      opacity: 0;
      transition: opacity 0.5s ease-out;
    }
    .masonry-item.visible {
      opacity: 1;
    }
    .masonry-item img {
      width: 100%;
      height: auto;
      display: block;
      border-radius: 8px;
    }

    /* Nav pill */
    .filter-pill { transition:all 0.3s ease; }
    .filter-pill.active { background:linear-gradient(135deg,#7B1E3A,#9B1B30); color:white; box-shadow:0 2px 10px rgba(123,30,58,0.3); }

    /* Lightbox */
    .lb-enter { animation: lbZoom 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes lbZoom { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* View transitions */
    .view-fade-in { animation: viewIn 0.5s ease forwards; }
    .view-fade-out { animation: viewOut 0.3s ease forwards; }
    @keyframes viewIn { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes viewOut { 0%{opacity:1} 100%{opacity:0} }

    /* Loading */
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-spinner { animation:spin 1s linear infinite; }

    @media(prefers-reduced-motion:reduce) {
      .face-card,.photo-card img { transition:none; }
      .orb { display:none; }
      .grain-overlay::after { display:none; }
    }
    @media(max-width:768px) {
      .orb{display:none!important}
      .grain-overlay::after{display:none!important}
    }
  </style>
</head>

<body class="damask-bg text-gray-900 grain-overlay">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Top Bar -->
  <nav class="sticky top-0 z-50 bg-cream-100/95 backdrop-blur-md border-b border-gold-400/15 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="/index.html" class="font-ui text-[10px] text-gold-600 tracking-[0.15em] uppercase hover:text-burgundy-800 transition flex items-center gap-2">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Gallery
      </a>
      <span class="font-display text-lg text-burgundy-800 italic">A & S</span>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 md:px-8 py-12">

    <!-- Header -->
    <div class="text-center mb-16" id="pageHeader">
      <div class="ornate-divider w-32 mx-auto mb-6">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#D4A855"/></svg>
      </div>
      <h1 class="font-display text-4xl md:text-6xl lg:text-7xl text-burgundy-800 font-black mb-4">Find Your Photos</h1>
      <p class="font-body text-lg md:text-xl text-burgundy-700/40 italic max-w-md mx-auto">Tap a face to see their photos</p>
    </div>

    <!-- Multi-select Action Bar -->
    <div id="multiSelectBar" class="hidden sticky top-16 z-40 mb-8">
      <div class="bg-burgundy-800/95 backdrop-blur-md rounded-2xl px-6 py-4 flex items-center justify-between shadow-xl border border-burgundy-700/30">
        <p id="selectedCount" class="font-ui text-[11px] text-cream-100 tracking-wide"></p>
        <div class="flex gap-3">
          <button id="clearSelectionBtn" class="px-4 py-2 rounded-full font-ui text-[10px] text-cream-100/60 hover:text-cream-100 border border-cream-100/20 hover:border-cream-100/40 tracking-[0.1em] uppercase transition">
            Clear
          </button>
          <button id="findGroupBtn" class="px-5 py-2 rounded-full font-ui text-[10px] text-burgundy-950 bg-gradient-to-r from-gold-400 to-gold-500 hover:from-gold-300 hover:to-gold-400 font-semibold tracking-[0.1em] uppercase shadow-md transition">
            Find Group Photos
          </button>
        </div>
      </div>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="text-center py-20">
      <div class="w-10 h-10 border-2 border-gold-400/30 border-t-gold-400 rounded-full loading-spinner mx-auto mb-4"></div>
      <p class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.2em] uppercase">Loading face data...</p>
    </div>

    <!-- Face Grid View -->
    <div id="gridView" class="hidden">
      <div class="flex justify-center mb-8">
        <button id="selectModeBtn"
          class="inline-flex items-center gap-2 px-5 py-2.5 rounded-full font-ui text-[10px] font-medium tracking-[0.15em] uppercase transition" style="background:rgba(250,236,208,0.6);color:#7B1E3A;border:1px solid rgba(212,168,85,0.15);">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          Find Group Photos
        </button>
      </div>
      <div id="faceGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-5 md:gap-6"></div>
      <p id="statsLine" class="text-center font-ui text-[10px] text-gold-500/40 tracking-[0.2em] uppercase mt-10"></p>
    </div>

    <!-- Person Detail View -->
    <div id="detailView" class="hidden">
      <!-- Back button -->
      <button id="backToGridBtn" class="font-ui text-[10px] text-gold-600 tracking-[0.15em] uppercase hover:text-burgundy-800 transition flex items-center gap-2 mb-8">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        All Guests
      </button>

      <!-- Person header -->
      <div class="flex items-center gap-5 mb-8" id="personHeader">
        <img id="personFace" src="" alt="" class="w-20 h-20 rounded-full border-2 border-gold-400/40 object-cover">
        <div>
          <p id="personCount" class="font-display text-2xl md:text-3xl text-burgundy-800 font-bold"></p>
          <p id="personEvents" class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.15em] uppercase mt-1"></p>
        </div>
      </div>

      <!-- Event filters (hidden — showing all photos together) -->
      <div class="hidden" id="eventFilters"></div>

      <!-- Photos grouped by event -->
      <div id="personPhotos"></div>

      <!-- Drive links (unused) -->
      <div id="driveLinks" class="hidden"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md hidden items-center justify-center" onclick="closeLightbox(event)">
    <button onclick="closeLightbox()" class="absolute top-4 right-4 z-10 text-white/50 hover:text-white transition-all hover:rotate-90 duration-300 p-2" aria-label="Close">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div id="lightboxCounter" class="absolute top-5 left-1/2 -translate-x-1/2 font-ui text-[10px] text-white/30 tracking-[0.3em]"></div>
    <button onclick="lightboxNav(-1)" class="absolute left-3 md:left-8 top-1/2 -translate-y-1/2 z-10 text-white/30 hover:text-white transition p-2" aria-label="Previous">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button onclick="lightboxNav(1)" class="absolute right-3 md:right-8 top-1/2 -translate-y-1/2 z-10 text-white/30 hover:text-white transition p-2" aria-label="Next">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <div id="lbSpinner" class="absolute inset-0 flex items-center justify-center pointer-events-none">
      <div class="w-8 h-8 border-2 border-white/20 border-t-white/60 rounded-full loading-spinner"></div>
    </div>
    <img id="lightboxImg" class="lb-enter max-h-[88vh] max-w-[92vw] md:max-w-[80vw] object-contain rounded-lg shadow-2xl" src="" alt="">
  </div>

  <script>
  gsap.registerPlugin(ScrollTrigger);

  // Lenis — disable on mobile to prevent touch event conflicts
  const isMobile = /iPhone|iPad|iPod|Android/i.test(navigator.userAgent);
  let lenis;
  if (!isMobile) {
    lenis = new Lenis({ duration:1.3, easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)) });
    lenis.on('scroll', ScrollTrigger.update);
    gsap.ticker.add(t=>lenis.raf(t*1000));
    gsap.ticker.lagSmoothing(0);
  } else {
    lenis = {
      scrollTo: (target, opts) => {
        const el = typeof target === 'string' ? document.querySelector(target) : null;
        const y = el ? el.getBoundingClientRect().top + window.scrollY + (opts?.offset || 0) : (typeof target === 'number' ? target : 0);
        window.scrollTo({ top: y, behavior: opts?.immediate ? 'instant' : 'smooth' });
      },
      stop: ()=>{}, start: ()=>{}
    };
  }

  // State
  let facesData = null;
  let currentCluster = null;
  let currentFilter = 'all';
  let selectedFaces = new Set(); // For multi-select mode
  let selectMode = false; // Toggle for select mode

  const EVENT_NAMES = {
    path:'Paath', mehdi:'Mehendi', shagan:'Shagan', sangeet:'Sangeet',
    vatna:'Vatna', wedding:'Wedding', reception:'Reception'
  };

  // ============================================================
  // LOAD DATA
  // ============================================================
  let driveIndex = {}; // filename → drive file ID

  async function loadData() {
    try {
      // Load face data first (required), then drive index in background (for fallback URLs)
      const facesRes = await fetch('assets/data/faces_data.json');
      if (!facesRes.ok) throw new Error(`HTTP ${facesRes.status}`);
      facesData = await facesRes.json();

      document.getElementById('loadingState').classList.add('hidden');

      // Check URL for deep link
      const params = new URLSearchParams(window.location.search);
      const personId = params.get('person');
      if (personId && facesData.clusters.find(c => c.id === personId)) {
        showPerson(personId);
      } else {
        showGrid();
      }

      // Load drive index in background (non-blocking) for photos without local thumbs
      fetch('assets/data/drive_photos.json').then(r => r.ok ? r.json() : null).then(driveData => {
        if (!driveData) return;
        for (const key in driveData.events) {
          const parts = key.split('_');
          const event = parts[0], side = parts[1];
          for (const photo of driveData.events[key]) {
            driveIndex[`${side}_${event}_${photo.name.toLowerCase()}`] = photo.id;
          }
        }
      }).catch(() => {});
    } catch(e) {
      document.getElementById('loadingState').innerHTML = `
        <p class="font-body text-lg text-burgundy-700/50 italic">Face data not yet available.</p>
        <p class="font-ui text-[10px] text-burgundy-700/30 mt-2">Run the face pipeline first to generate data.</p>
      `;
    }
  }

  function getPhotoUrl(photo) {
    // Prefer full-res Google Drive URL over local thumbnail
    const driveKey = `${photo.side}_${photo.event}_${photo.filename.toLowerCase()}`;
    const driveId = driveIndex[driveKey];
    if (driveId) return `https://lh3.googleusercontent.com/d/${driveId}=w1200`;
    if (photo.thumb) return photo.thumb;
    return null;
  }

  // ============================================================
  // FACE GRID
  // ============================================================
  function showGrid() {
    currentCluster = null;
    window._allPersonPhotos = null;
    clearSelection(); // Reset select mode, selectedFaces, and button state
    const gridEl = document.getElementById('gridView');
    gridEl.classList.remove('hidden');
    document.getElementById('detailView').classList.add('hidden');
    // Re-trigger fade-in animation by removing and re-adding class after reflow
    gridEl.classList.remove('view-fade-in');
    void gridEl.offsetWidth;
    gridEl.classList.add('view-fade-in');
    document.getElementById('multiSelectBar').classList.add('hidden');
    history.replaceState({view:'grid'}, '', 'find-my-photos.html');

    const grid = document.getElementById('faceGrid');
    grid.innerHTML = facesData.clusters.map((c, i) => `
      <div class="face-card text-center p-3" data-cluster="${c.id}" style="animation-delay:${i*40}ms; cursor:pointer; -webkit-tap-highlight-color:transparent;">
        <div class="face-img w-20 h-20 md:w-20 md:h-20 rounded-full mx-auto mb-2 overflow-hidden bg-burgundy-50 relative">
          <img src="${c.thumbnail}" alt="Guest" class="w-full h-full object-cover" loading="lazy">
          <div class="select-check hidden absolute inset-0 bg-burgundy-800/50 flex items-center justify-center rounded-full">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="3"><path d="M20 6L9 17l-5-5"/></svg>
          </div>
        </div>
        <p class="font-ui text-[9px] text-burgundy-700/50">${c.photo_count} photos</p>
      </div>
    `).join('');

    // Click event with debounce — works on all browsers and devices
    if (!grid._listenersAttached) {
      let lastTap = 0;
      function onFaceTap(e) {
        // Debounce: ignore if fired within 300ms (prevents double-fire from touch+click)
        const now = Date.now();
        if (now - lastTap < 300) return;
        lastTap = now;
        const card = e.target.closest('.face-card');
        if (!card) return;
        const cid = card.dataset.cluster;
        if (cid) handleFaceClick(cid, e);
      }
      grid.addEventListener('click', onFaceTap);
      // touchend fallback for iOS Safari where click sometimes doesn't fire
      grid.addEventListener('touchend', function(e) {
        const card = e.target.closest('.face-card');
        if (!card) return;
        e.preventDefault();
        onFaceTap(e);
      }, { passive: false });
      grid._listenersAttached = true;
    }

    document.getElementById('statsLine').textContent =
      `${facesData.stats.clusters} guests found across ${facesData.stats.photos_scanned.toLocaleString()} photos`;

    // GSAP stagger entrance — only animate first 30 for performance, show rest immediately
    const allCards = grid.querySelectorAll('.face-card');
    const animateCount = Math.min(30, allCards.length);
    if (animateCount > 0) {
      gsap.fromTo(Array.from(allCards).slice(0, animateCount),
        { opacity:0, y:20, scale:0.9 },
        { opacity:1, y:0, scale:1, duration:0.5, stagger:0.03, ease:'power2.out' });
    }
    // Show remaining cards immediately without animation
    for (let i = animateCount; i < allCards.length; i++) {
      allCards[i].style.opacity = '1';
    }
  }

  function toggleSelectMode() {
    selectMode = !selectMode;
    const btn = document.getElementById('selectModeBtn');
    if (selectMode) {
      btn.style.background = '#7B1E3A';
      btn.style.color = '#FDF5E6';
      btn.style.border = '1px solid #6b1a33';
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Now tap the people you want to find together
      `;
    } else {
      btn.style.background = 'rgba(250,236,208,0.6)';
      btn.style.color = '#7B1E3A';
      btn.style.border = '1px solid rgba(212,168,85,0.15)';
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Find Group Photos
      `;
      clearSelection();
    }
  }

  function handleFaceClick(clusterId, event) {
    if (selectMode || (event && event.ctrlKey) || (event && event.metaKey)) {
      toggleFaceSelection(clusterId);
    } else {
      showPerson(clusterId);
    }
  }

  function toggleFaceSelection(clusterId) {
    if (selectedFaces.has(clusterId)) {
      selectedFaces.delete(clusterId);
    } else {
      selectedFaces.add(clusterId);
    }
    updateSelectionUI();
  }

  function updateSelectionUI() {
    // Update face card visuals
    document.querySelectorAll('.face-card').forEach(card => {
      const cid = card.dataset.cluster;
      const check = card.querySelector('.select-check');
      if (selectedFaces.has(cid)) {
        check.classList.remove('hidden');
        card.querySelector('.face-img').style.borderColor = '#7B1E3A';
        card.querySelector('.face-img').style.borderWidth = '3px';
      } else {
        check.classList.add('hidden');
        card.querySelector('.face-img').style.borderColor = '';
        card.querySelector('.face-img').style.borderWidth = '';
      }
    });

    // Show/hide multi-select action bar
    const bar = document.getElementById('multiSelectBar');
    if (selectedFaces.size >= 2) {
      bar.classList.remove('hidden');
      document.getElementById('selectedCount').textContent =
        `${selectedFaces.size} people selected`;
    } else if (selectedFaces.size === 1) {
      bar.classList.remove('hidden');
      document.getElementById('selectedCount').textContent =
        `Tap one more face to find photos together`;
    } else {
      bar.classList.add('hidden');
    }
  }

  function clearSelection() {
    selectedFaces.clear();
    selectMode = false;
    const btn = document.getElementById('selectModeBtn');
    if (btn) {
      btn.classList.add('bg-cream-200/60', 'text-burgundy-800', 'border-gold-400/15');
      btn.classList.remove('bg-burgundy-800', 'text-cream-100', 'border-burgundy-700');
      btn.innerHTML = `
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
        Find Group Photos
      `;
    }
    updateSelectionUI();
  }

  function showGroupPhotos() {
    if (selectedFaces.size < 2) return;

    // Find photos that appear in ALL selected clusters
    const clusterPhotos = Array.from(selectedFaces).map(cid => {
      const cluster = facesData.clusters.find(c => c.id === cid);
      return new Set(cluster.photos.map(p => p.id));
    });

    // Intersection of all sets
    let commonIds = clusterPhotos[0];
    for (let i = 1; i < clusterPhotos.length; i++) {
      commonIds = new Set([...commonIds].filter(id => clusterPhotos[i].has(id)));
    }

    if (commonIds.size === 0) {
      alert('No photos found with all selected people together.');
      return;
    }

    // Get the actual photo objects from the first cluster (they have the same data)
    const firstCluster = facesData.clusters.find(c => c.id === Array.from(selectedFaces)[0]);
    const commonPhotos = firstCluster.photos.filter(p => commonIds.has(p.id));

    // Build a virtual cluster for display
    const selectedThumbnails = Array.from(selectedFaces).map(cid =>
      facesData.clusters.find(c => c.id === cid).thumbnail
    );

    currentCluster = {
      id: 'group',
      thumbnail: selectedThumbnails[0],
      photo_count: commonPhotos.length,
      events: [...new Set(commonPhotos.map(p => p.event))],
      photos: commonPhotos,
      _selectedThumbnails: selectedThumbnails
    };

    currentFilter = 'all';
    document.getElementById('gridView').classList.add('hidden');
    document.getElementById('multiSelectBar').classList.add('hidden');
    const detailEl2 = document.getElementById('detailView');
    detailEl2.classList.remove('hidden');
    detailEl2.classList.remove('view-fade-in');
    void detailEl2.offsetWidth;
    detailEl2.classList.add('view-fade-in');
    history.pushState({view:'group'}, '', 'find-my-photos.html?group=true');

    // Header — show all selected faces
    document.getElementById('personHeader').innerHTML = `
      <div class="flex -space-x-3 mr-3">
        ${selectedThumbnails.map(t => `
          <img src="${t}" class="w-14 h-14 md:w-16 md:h-16 rounded-full border-2 border-cream-100 object-cover" alt="Guest">
        `).join('')}
      </div>
      <div>
        <p id="personCount" class="font-display text-2xl md:text-3xl text-burgundy-800 font-bold">Found ${commonPhotos.length} photos together</p>
        <p id="personEvents" class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.15em] uppercase mt-1">Across ${currentCluster.events.map(e => EVENT_NAMES[e]||e).join(', ')}</p>
      </div>
    `;

    renderPhotos();
    lenis.scrollTo(0, { immediate:true });
  }

  // ============================================================
  // PERSON DETAIL
  // ============================================================
  function showPerson(clusterId) {
    currentCluster = facesData.clusters.find(c => c.id === clusterId);
    if (!currentCluster) return;

    currentFilter = 'all';
    document.getElementById('gridView').classList.add('hidden');
    const detailEl = document.getElementById('detailView');
    detailEl.classList.remove('hidden');
    detailEl.classList.remove('view-fade-in');
    void detailEl.offsetWidth;
    detailEl.classList.add('view-fade-in');
    history.pushState({view:'person', id:clusterId}, '', `find-my-photos.html?person=${clusterId}`);

    // Header — always rebuild to restore original structure
    document.getElementById('personHeader').innerHTML = `
      <img src="${currentCluster.thumbnail}" alt="" class="w-20 h-20 rounded-full border-2 border-gold-400/40 object-cover">
      <div>
        <p class="font-display text-2xl md:text-3xl text-burgundy-800 font-bold">Found in ${currentCluster.photo_count} photos</p>
        <p class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.15em] uppercase mt-1">Across ${currentCluster.events.map(e => EVENT_NAMES[e]||e).join(', ')}</p>
      </div>
    `;

    // Render all photos (no event filtering)
    renderPhotos();

    // Scroll to top
    lenis.scrollTo(0, { immediate:true });
  }

  const PHOTOS_PER_BATCH = 40;
  let _photoBatches = {}; // eventId → { photos[], rendered }
  let _photoScrollHandler = null;

  function renderPhotos() {
    const el = document.getElementById('personPhotos');
    const driveEl = document.getElementById('driveLinks');
    driveEl.innerHTML = '';

    // Clean up previous scroll handler
    if (_photoScrollHandler) { window.removeEventListener('scroll', _photoScrollHandler); _photoScrollHandler = null; }

    const photos = currentCluster.photos.map(p => ({ ...p, url: getPhotoUrl(p) })).filter(p => p.url);

    // Group by event and build flat index for lightbox
    const eventOrder = ['mehdi','shagan','sangeet','vatna','wedding','reception','path'];
    const grouped = {};
    photos.forEach(p => {
      if (!grouped[p.event]) grouped[p.event] = [];
      grouped[p.event].push(p);
    });

    const allPhotosFlat = [];
    _photoBatches = {};
    let html = '';

    eventOrder.forEach(eventId => {
      if (!grouped[eventId]) return;
      const eventPhotos = grouped[eventId];
      const startIdx = allPhotosFlat.length;
      eventPhotos.forEach(p => allPhotosFlat.push(p));

      _photoBatches[eventId] = { photos: eventPhotos, rendered: 0, startIdx };

      html += `
        <div class="mb-12" id="event-section-${eventId}">
          <div class="flex items-center justify-between mb-5">
            <div>
              <h3 class="font-display text-2xl md:text-3xl text-burgundy-800 font-bold">${EVENT_NAMES[eventId] || eventId}</h3>
              <p class="font-ui text-[9px] text-burgundy-700/40 tracking-[0.15em] uppercase mt-1">${eventPhotos.length} photos</p>
            </div>
          </div>
          <div class="masonry" id="masonry-${eventId}"></div>
        </div>
      `;
    });

    el.innerHTML = html;
    window._allPersonPhotos = allPhotosFlat;

    // Render first batch for each event
    for (const eventId in _photoBatches) {
      renderPhotoBatch(eventId);
    }

    // Infinite scroll — render more as user scrolls down
    let scrollThrottle = false;
    _photoScrollHandler = function() {
      if (scrollThrottle) return;
      scrollThrottle = true;
      requestAnimationFrame(() => {
        scrollThrottle = false;
        const viewBottom = window.scrollY + window.innerHeight + 600;
        for (const eventId in _photoBatches) {
          const batch = _photoBatches[eventId];
          if (batch.rendered >= batch.photos.length) continue;
          const container = document.getElementById(`masonry-${eventId}`);
          if (container && container.getBoundingClientRect().bottom < window.innerHeight + 800) {
            renderPhotoBatch(eventId);
          }
        }
      });
    };
    window.addEventListener('scroll', _photoScrollHandler, { passive: true });
  }

  // ============================================================
  // MASONRY LAYOUT ENGINE (debounced to prevent O(n²) on image load)
  // ============================================================
  function getMasonryCols() { return window.innerWidth >= 1024 ? 4 : window.innerWidth >= 768 ? 3 : 2; }
  function getMasonryGap() { return window.innerWidth >= 768 ? 14 : 10; }

  function layoutMasonry(container, startFrom) {
    const cols = getMasonryCols();
    const gap = getMasonryGap();
    const containerWidth = container.clientWidth;
    if (containerWidth === 0) return;
    const colWidth = (containerWidth - gap * (cols - 1)) / cols;

    const items = container.querySelectorAll('.masonry-item');
    if (!container._colHeights || startFrom === 0) {
      container._colHeights = new Array(cols).fill(0);
    }

    for (let i = startFrom; i < items.length; i++) {
      const item = items[i];
      const shortest = container._colHeights.indexOf(Math.min(...container._colHeights));
      const x = shortest * (colWidth + gap);
      const y = container._colHeights[shortest];

      item.style.width = colWidth + 'px';
      item.style.left = x + 'px';
      item.style.top = y + 'px';

      const img = item.querySelector('img');
      const itemHeight = (img && img.naturalHeight && img.naturalWidth)
        ? (img.naturalHeight / img.naturalWidth) * colWidth
        : colWidth * 0.75;

      container._colHeights[shortest] += itemHeight + gap;
    }

    container.style.height = Math.max(...container._colHeights) + 'px';
  }

  // Debounced re-layout: coalesces multiple image load events into a single rAF
  const _dirtyContainers = new Set();
  let _layoutRafId = null;
  function scheduleMasonryRelayout(container) {
    _dirtyContainers.add(container);
    if (_layoutRafId) return;
    _layoutRafId = requestAnimationFrame(() => {
      _dirtyContainers.forEach(c => { c._colHeights = null; layoutMasonry(c, 0); });
      _dirtyContainers.clear();
      _layoutRafId = null;
    });
  }

  // Re-layout on resize/orientation change
  let _resizeTimer;
  window.addEventListener('resize', () => {
    clearTimeout(_resizeTimer);
    _resizeTimer = setTimeout(() => {
      document.querySelectorAll('.masonry').forEach(c => {
        c._colHeights = null;
        layoutMasonry(c, 0);
      });
    }, 200);
  });

  function renderPhotoBatch(eventId) {
    const batch = _photoBatches[eventId];
    if (!batch || batch.rendered >= batch.photos.length) return;

    const container = document.getElementById(`masonry-${eventId}`);
    if (!container) return;

    const start = batch.rendered;
    const end = Math.min(start + PHOTOS_PER_BATCH, batch.photos.length);
    const prevItemCount = container.querySelectorAll('.masonry-item').length;

    for (let i = start; i < end; i++) {
      const p = batch.photos[i];
      const globalIdx = batch.startIdx + i;
      const item = document.createElement('div');
      item.className = 'masonry-item';
      item.innerHTML = `
        <div class="photo-card" onclick="openLb(${globalIdx})">
          <img src="${p.url}" alt="${EVENT_NAMES[p.event]||p.event}" loading="lazy" decoding="async" class="w-full block"
               onerror="this.parentElement.parentElement.style.display='none'">
          <div class="overlay"></div>
        </div>
      `;
      container.appendChild(item);

      // When image loads, schedule a debounced re-layout (coalesces many loads into 1 rAF)
      const img = item.querySelector('img');
      if (img) {
        img.addEventListener('load', () => scheduleMasonryRelayout(container), { once: true });
      }
    }

    batch.rendered = end;

    // Position new items
    layoutMasonry(container, prevItemCount);

    // Observe new items for fade-in
    const newItems = container.querySelectorAll('.masonry-item:not(.observed)');
    newItems.forEach(item => {
      item.classList.add('observed');
      photoObserver.observe(item);
    });
    // Fallback: force-show items near viewport after 300ms
    setTimeout(() => {
      newItems.forEach(item => {
        if (!item.classList.contains('visible')) {
          const rect = item.getBoundingClientRect();
          if (rect.top < window.innerHeight + 200) {
            item.classList.add('visible');
          }
        }
      });
    }, 300);
  }

  // ============================================================
  // LIGHTBOX
  // ============================================================
  let lbPhotos=[], lbIdx=0;

  let lbScrollY = 0;

  function openLb(idx) {
    lbPhotos = window._allPersonPhotos || (currentCluster ? currentCluster.photos.filter(p => p.thumb) : []);
    if (!lbPhotos.length) return;
    lbIdx = idx;
    updateLb();
    const lb = document.getElementById('lightbox');
    lb.classList.remove('hidden'); lb.classList.add('flex');
    // iOS-safe scroll lock
    lbScrollY = window.scrollY;
    document.body.style.position = 'fixed'; document.body.style.top = `-${lbScrollY}px`; document.body.style.width = '100%';
    lenis.stop();
  }

  function closeLightbox(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightbox').classList.remove('flex');
    // Restore scroll position
    document.body.style.position = ''; document.body.style.top = ''; document.body.style.width = '';
    window.scrollTo(0, lbScrollY);
    lenis.start();
  }

  function lightboxNav(d) { lbIdx=(lbIdx+d+lbPhotos.length)%lbPhotos.length; updateLb(); }

  function updateLb() {
    const p=lbPhotos[lbIdx], img=document.getElementById('lightboxImg');
    const url = p.url || p.thumb;
    const fullUrl = url.includes('lh3.googleusercontent.com') ? url.replace('=w1200', '=w0') : url;

    const spinner = document.getElementById('lbSpinner');

    // Immediately hide old image and show spinner
    img.style.opacity = 0;
    img.classList.remove('lb-enter');
    img.src = '';
    spinner.style.display = 'flex';

    document.getElementById('lightboxCounter').textContent = `${lbIdx+1} / ${lbPhotos.length}`;

    // Preload new image, then reveal
    const preload = new Image();
    preload.onload = function() {
      img.src = fullUrl;
      spinner.style.display = 'none';
      img.classList.add('lb-enter');
      img.style.opacity = 1;
    };
    preload.onerror = function() {
      img.src = p.url || p.thumb;
      spinner.style.display = 'none';
      img.classList.add('lb-enter');
      img.style.opacity = 1;
    };
    preload.src = fullUrl;

    // Preload adjacent images
    [-1,1].forEach(o => {
      const i = (lbIdx+o+lbPhotos.length) % lbPhotos.length;
      const adjUrl = lbPhotos[i].url || lbPhotos[i].thumb;
      new Image().src = adjUrl;
    });
  }

  document.addEventListener('keydown',e=>{
    if(document.getElementById('lightbox').classList.contains('hidden'))return;
    if(e.key==='Escape')closeLightbox();
    if(e.key==='ArrowLeft')lightboxNav(-1);
    if(e.key==='ArrowRight')lightboxNav(1);
  });

  // Touch swipe — attach to both container and image so swipe works on the photo itself
  let tx=0;
  function _lbTouchStart(e){tx=e.changedTouches[0].clientX;}
  function _lbTouchEnd(e){const d=e.changedTouches[0].clientX-tx;if(Math.abs(d)>50){e.preventDefault();lightboxNav(d>0?-1:1);}}
  const _fmpLb=document.getElementById('lightbox'), _fmpLbImg=document.getElementById('lightboxImg');
  _fmpLb.addEventListener('touchstart',_lbTouchStart,{passive:true});
  _fmpLb.addEventListener('touchend',_lbTouchEnd,{passive:false});
  _fmpLbImg.addEventListener('touchstart',_lbTouchStart,{passive:true});
  _fmpLbImg.addEventListener('touchend',function(e){e.stopPropagation();_lbTouchEnd(e);},{passive:false});

  // Back button — guard against null facesData
  window.addEventListener('popstate', e => {
    if (!facesData) return;
    if (e.state?.view === 'grid' || !e.state) showGrid();
    else if (e.state?.view === 'person') showPerson(e.state.id);
  });

  // ============================================================
  // INIT
  // ============================================================
  // Animate header
  gsap.fromTo('#pageHeader', {y:30,opacity:0},{y:0,opacity:1,duration:1,ease:'power3.out',delay:0.2});

  // IntersectionObserver — fade in photos as they enter viewport
  // threshold:0 ensures items with zero height (before lazy images load) still trigger
  const photoObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        photoObserver.unobserve(entry.target);
      }
    });
  }, {
    rootMargin: '200px 0px',
    threshold: 0
  });

  // Button handlers — attach immediately (no DOMContentLoaded, elements already exist above)
  // Helper: attach both click and touchend with debounce for reliable mobile taps
  function attachTapHandler(el, fn) {
    if (!el) return;
    let lastTap = 0;
    function onTap() {
      const now = Date.now();
      if (now - lastTap < 300) return;
      lastTap = now;
      fn();
    }
    el.addEventListener('click', onTap);
    el.addEventListener('touchend', function(e) { e.preventDefault(); onTap(); }, { passive: false });
  }

  attachTapHandler(document.getElementById('selectModeBtn'), toggleSelectMode);
  attachTapHandler(document.getElementById('clearSelectionBtn'), clearSelection);
  attachTapHandler(document.getElementById('findGroupBtn'), showGroupPhotos);
  attachTapHandler(document.getElementById('backToGridBtn'), showGrid);

  loadData();
  </script>
</body>
