<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Find My Photos — Sharan & Avleen Wedding</title>
  <meta name="description" content="Find your photos from Sharan & Avleen's wedding using face recognition">
  <meta name="theme-color" content="#7B1E3A">

  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            burgundy: { 50:'#fdf2f4',100:'#fce7eb',200:'#f9d0d9',300:'#f4a9ba',400:'#ec7696',500:'#df4b74',600:'#c9295a',700:'#a91d49',800:'#7B1E3A',900:'#6b1a33',950:'#3d0a1a' },
            gold: { 50:'#fdfaef',100:'#faf2d0',200:'#f4e29d',300:'#edce6a',400:'#D4A855',500:'#d4a037',600:'#b8822a',700:'#956224',800:'#7a4f24',900:'#664221' },
            cream: { 50:'#FFFDF7',100:'#FDF5E6',200:'#faecd0',300:'#f5ddb0' },
          },
          fontFamily: {
            display: ['"Playfair Display"','Georgia','serif'],
            body: ['"Cormorant Garamond"','Georgia','serif'],
            ui: ['Poppins','system-ui','sans-serif']
          }
        }
      }
    }
  </script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,800;0,900;1,400&family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/gsap.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/gsap@3.12.7/dist/ScrollTrigger.min.js"></script>
  <script src="https://unpkg.com/lenis@1.1.18/dist/lenis.min.js"></script>

  <style>
    html.lenis, html.lenis body { height:auto; }
    .lenis.lenis-smooth { scroll-behavior:auto!important; }
    body { font-family:'Cormorant Garamond',Georgia,serif; overflow-x:hidden; }

    /* Damask */
    .damask-bg {
      background-color: #FDF5E6;
      background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23d4a855' fill-opacity='0.04'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
    }

    /* Grain */
    .grain-overlay::after {
      content:''; position:fixed; inset:0; z-index:100; pointer-events:none; opacity:0.03;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
      background-repeat:repeat; background-size:256px 256px;
    }

    /* Floating orbs */
    .orb { position:fixed; border-radius:50%; pointer-events:none; z-index:0; filter:blur(80px); opacity:0.1; will-change:transform; }
    .orb-1 { width:400px; height:400px; top:-5%; right:-10%; background:radial-gradient(circle,#D4A855,transparent 70%); animation:orbF1 25s ease-in-out infinite; }
    .orb-2 { width:350px; height:350px; bottom:10%; left:-10%; background:radial-gradient(circle,#7B1E3A,transparent 70%); animation:orbF2 30s ease-in-out infinite; }
    @keyframes orbF1 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(-60px,80px)} }
    @keyframes orbF2 { 0%,100%{transform:translate(0,0)} 50%{transform:translate(50px,-60px)} }

    /* Ornate divider */
    .ornate-divider { display:flex; align-items:center; gap:16px; }
    .ornate-divider::before,.ornate-divider::after { content:''; flex:1; height:1px; background:linear-gradient(90deg,transparent,#D4A855,transparent); }

    /* Gold shimmer */
    @keyframes shimmer { 0%{background-position:-200% center} 100%{background-position:200% center} }
    .gold-shimmer {
      background:linear-gradient(90deg,#D4A855 0%,#f5e6b8 20%,#D4A855 40%,#f5e6b8 60%,#D4A855 80%);
      background-size:200% auto; -webkit-background-clip:text; background-clip:text;
      -webkit-text-fill-color:transparent; animation:shimmer 8s linear infinite;
    }

    /* Face card */
    .face-card {
      cursor:pointer; transition: all 0.4s cubic-bezier(0.25,0.46,0.45,0.94);
    }
    .face-card:hover { transform:translateY(-6px) scale(1.05); }
    .face-card:hover .face-img { border-color:rgba(212,168,85,0.8); box-shadow:0 0 30px rgba(212,168,85,0.2); }
    .face-img {
      border: 2px solid rgba(212,168,85,0.25);
      transition: all 0.4s ease;
    }

    /* Photo card */
    .photo-card { position:relative; overflow:hidden; border-radius:8px; cursor:pointer; }
    .photo-card img { transition:transform 1s cubic-bezier(0.25,0.46,0.45,0.94); }
    .photo-card:hover img { transform:scale(1.08); }
    .photo-card .overlay {
      position:absolute; inset:0;
      background:linear-gradient(to top, rgba(123,30,58,0.6) 0%, transparent 50%);
      opacity:0; transition:opacity 0.5s ease;
    }
    .photo-card:hover .overlay { opacity:1; }

    /* Masonry */
    .masonry { column-count:2; column-gap:10px; }
    @media(min-width:768px) { .masonry { column-count:3; column-gap:14px; } }
    .masonry-item { break-inside:avoid; margin-bottom:10px; }
    @media(min-width:768px) { .masonry-item { margin-bottom:14px; } }

    /* Nav pill */
    .filter-pill { transition:all 0.3s ease; }
    .filter-pill.active { background:linear-gradient(135deg,#7B1E3A,#9B1B30); color:white; box-shadow:0 2px 10px rgba(123,30,58,0.3); }

    /* Lightbox */
    .lb-enter { animation: lbZoom 0.5s cubic-bezier(0.16,1,0.3,1) forwards; }
    @keyframes lbZoom { 0%{transform:scale(0.85);opacity:0} 100%{transform:scale(1);opacity:1} }

    /* View transitions */
    .view-fade-in { animation: viewIn 0.5s ease forwards; }
    .view-fade-out { animation: viewOut 0.3s ease forwards; }
    @keyframes viewIn { 0%{opacity:0;transform:translateY(20px)} 100%{opacity:1;transform:translateY(0)} }
    @keyframes viewOut { 0%{opacity:1} 100%{opacity:0} }

    /* Loading */
    @keyframes spin { to{transform:rotate(360deg)} }
    .loading-spinner { animation:spin 1s linear infinite; }

    @media(prefers-reduced-motion:reduce) {
      .face-card,.photo-card img { transition:none; }
      .orb { display:none; }
      .grain-overlay::after { display:none; }
    }
  </style>
</head>

<body class="damask-bg text-gray-900 grain-overlay">
  <div class="orb orb-1"></div>
  <div class="orb orb-2"></div>

  <!-- Top Bar -->
  <nav class="sticky top-0 z-50 bg-cream-100/95 backdrop-blur-md border-b border-gold-400/15 shadow-sm">
    <div class="max-w-6xl mx-auto px-4 py-3 flex items-center justify-between">
      <a href="index.html" onclick="event.preventDefault(); if(document.referrer.includes('index.html')||document.referrer.endsWith('/')){history.back();}else{location.href='index.html';}" class="font-ui text-[10px] text-gold-600 tracking-[0.15em] uppercase hover:text-burgundy-800 transition flex items-center gap-2 cursor-pointer">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        Back to Gallery
      </a>
      <span class="font-display text-lg text-burgundy-800 italic">S & A</span>
    </div>
  </nav>

  <!-- Main Content -->
  <main class="max-w-6xl mx-auto px-4 md:px-8 py-12">

    <!-- Header -->
    <div class="text-center mb-16" id="pageHeader">
      <div class="ornate-divider w-32 mx-auto mb-6">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none"><path d="M12 2L14.5 9.5L22 12L14.5 14.5L12 22L9.5 14.5L2 12L9.5 9.5L12 2Z" fill="#D4A855"/></svg>
      </div>
      <h1 class="font-display text-4xl md:text-6xl lg:text-7xl text-burgundy-800 font-black mb-4">Find Your Photos</h1>
      <p class="font-body text-lg md:text-xl text-burgundy-700/40 italic max-w-md mx-auto">Tap your face to see every photo you appear in across all events</p>
    </div>

    <!-- Loading State -->
    <div id="loadingState" class="text-center py-20">
      <div class="w-10 h-10 border-2 border-gold-400/30 border-t-gold-400 rounded-full loading-spinner mx-auto mb-4"></div>
      <p class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.2em] uppercase">Loading face data...</p>
    </div>

    <!-- Face Grid View -->
    <div id="gridView" class="hidden">
      <div id="faceGrid" class="grid grid-cols-3 sm:grid-cols-4 md:grid-cols-5 lg:grid-cols-6 xl:grid-cols-8 gap-5 md:gap-6"></div>
      <p id="statsLine" class="text-center font-ui text-[10px] text-gold-500/40 tracking-[0.2em] uppercase mt-10"></p>
    </div>

    <!-- Person Detail View -->
    <div id="detailView" class="hidden">
      <!-- Back button -->
      <button onclick="showGrid()" class="font-ui text-[10px] text-gold-600 tracking-[0.15em] uppercase hover:text-burgundy-800 transition flex items-center gap-2 mb-8">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M19 12H5M12 19l-7-7 7-7"/></svg>
        All Guests
      </button>

      <!-- Person header -->
      <div class="flex items-center gap-5 mb-8" id="personHeader">
        <img id="personFace" src="" alt="" class="w-20 h-20 rounded-full border-2 border-gold-400/40 object-cover">
        <div>
          <p id="personCount" class="font-display text-2xl md:text-3xl text-burgundy-800 font-bold"></p>
          <p id="personEvents" class="font-ui text-[10px] text-burgundy-700/40 tracking-[0.15em] uppercase mt-1"></p>
        </div>
      </div>

      <!-- Event filters (hidden — showing all photos together) -->
      <div class="hidden" id="eventFilters"></div>

      <!-- Photo grid -->
      <div id="personPhotos" class="masonry"></div>

      <!-- Drive links -->
      <div id="driveLinks" class="mt-10 space-y-3"></div>
    </div>
  </main>

  <!-- Lightbox -->
  <div id="lightbox" class="fixed inset-0 z-[100] bg-black/95 backdrop-blur-md hidden items-center justify-center" onclick="closeLightbox(event)">
    <button onclick="closeLightbox()" class="absolute top-4 right-4 z-10 text-white/50 hover:text-white transition-all hover:rotate-90 duration-300 p-2" aria-label="Close">
      <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M18 6L6 18M6 6l12 12"/></svg>
    </button>
    <div id="lightboxCounter" class="absolute top-5 left-1/2 -translate-x-1/2 font-ui text-[10px] text-white/30 tracking-[0.3em]"></div>
    <button onclick="lightboxNav(-1)" class="absolute left-3 md:left-8 top-1/2 -translate-y-1/2 z-10 text-white/30 hover:text-white transition p-2" aria-label="Previous">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M15 18l-6-6 6-6"/></svg>
    </button>
    <button onclick="lightboxNav(1)" class="absolute right-3 md:right-8 top-1/2 -translate-y-1/2 z-10 text-white/30 hover:text-white transition p-2" aria-label="Next">
      <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M9 18l6-6-6-6"/></svg>
    </button>
    <img id="lightboxImg" class="lb-enter max-h-[88vh] max-w-[92vw] md:max-w-[80vw] object-contain rounded-lg shadow-2xl" src="" alt="" onclick="event.stopPropagation()">
  </div>

  <script>
  gsap.registerPlugin(ScrollTrigger);

  // Lenis
  const lenis = new Lenis({ duration:1.3, easing:t=>Math.min(1,1.001-Math.pow(2,-10*t)) });
  lenis.on('scroll', ScrollTrigger.update);
  gsap.ticker.add(t=>lenis.raf(t*1000));
  gsap.ticker.lagSmoothing(0);

  // State
  let facesData = null;
  let currentCluster = null;
  let currentFilter = 'all';

  const EVENT_NAMES = {
    path:'Path', mehdi:'Mehdi', shagan:'Shagan', sangeet:'Sangeet',
    vatna:'Vatna', wedding:'Wedding', reception:'Reception'
  };

  // ============================================================
  // LOAD DATA
  // ============================================================
  async function loadData() {
    try {
      const res = await fetch('assets/data/faces_data.json');
      facesData = await res.json();
      document.getElementById('loadingState').classList.add('hidden');
      showGrid();
    } catch(e) {
      document.getElementById('loadingState').innerHTML = `
        <p class="font-body text-lg text-burgundy-700/50 italic">Face data not yet available.</p>
        <p class="font-ui text-[10px] text-burgundy-700/30 mt-2">Run the face pipeline first to generate data.</p>
      `;
    }
  }

  // ============================================================
  // FACE GRID
  // ============================================================
  function showGrid() {
    currentCluster = null;
    document.getElementById('gridView').classList.remove('hidden');
    document.getElementById('detailView').classList.add('hidden');
    document.getElementById('gridView').classList.add('view-fade-in');
    history.pushState({view:'grid'}, '', 'find-my-photos.html');

    const grid = document.getElementById('faceGrid');
    grid.innerHTML = facesData.clusters.map((c, i) => `
      <div class="face-card text-center" onclick="showPerson('${c.id}')" style="animation-delay:${i*40}ms">
        <div class="face-img w-16 h-16 md:w-20 md:h-20 rounded-full mx-auto mb-2 overflow-hidden bg-burgundy-50">
          <img src="${c.thumbnail}" alt="Guest" class="w-full h-full object-cover" loading="lazy">
        </div>
        <p class="font-ui text-[9px] text-burgundy-700/50">${c.photo_count} photos</p>
      </div>
    `).join('');

    document.getElementById('statsLine').textContent =
      `${facesData.stats.clusters} guests found across ${facesData.stats.photos_scanned.toLocaleString()} photos`;

    // GSAP stagger entrance
    gsap.fromTo('#faceGrid .face-card',
      { opacity:0, y:20, scale:0.9 },
      { opacity:1, y:0, scale:1, duration:0.5, stagger:0.03, ease:'power2.out' });
  }

  // ============================================================
  // PERSON DETAIL
  // ============================================================
  function showPerson(clusterId) {
    currentCluster = facesData.clusters.find(c => c.id === clusterId);
    if (!currentCluster) return;

    currentFilter = 'all';
    document.getElementById('gridView').classList.add('hidden');
    document.getElementById('detailView').classList.remove('hidden');
    document.getElementById('detailView').classList.add('view-fade-in');
    history.pushState({view:'person', id:clusterId}, '', `find-my-photos.html?person=${clusterId}`);

    // Header
    document.getElementById('personFace').src = currentCluster.thumbnail;
    document.getElementById('personCount').textContent = `Found in ${currentCluster.photo_count} photos`;
    document.getElementById('personEvents').textContent = `Across ${currentCluster.events.map(e => EVENT_NAMES[e]||e).join(', ')}`;

    // Render all photos (no event filtering)
    renderPhotos();
    renderDriveLinks();

    // Scroll to top
    lenis.scrollTo(0, { immediate:true });
  }

  function renderPhotos() {
    const el = document.getElementById('personPhotos');
    const photos = currentCluster.photos.filter(p => p.thumb);

    el.innerHTML = photos.map((p, i) => `
      <div class="masonry-item">
        <div class="photo-card" onclick="openLb(${i})">
          <img src="${p.thumb}" alt="${EVENT_NAMES[p.event]||p.event}" loading="lazy" decoding="async" class="w-full block">
          <div class="overlay"></div>
          <div class="absolute bottom-2 left-2 font-ui text-[8px] text-white/60 tracking-wider uppercase opacity-0 transition" style="transition:opacity 0.3s">${EVENT_NAMES[p.event]||p.event}</div>
        </div>
      </div>
    `).join('');

    // Show event label on hover
    el.querySelectorAll('.photo-card').forEach(card => {
      card.addEventListener('mouseenter', () => card.querySelector('.absolute')?.style.setProperty('opacity','1'));
      card.addEventListener('mouseleave', () => card.querySelector('.absolute')?.style.setProperty('opacity','0'));
    });

    // GSAP stagger
    gsap.fromTo('#personPhotos .masonry-item',
      { clipPath:'inset(100% 0 0 0)', opacity:0 },
      { clipPath:'inset(0% 0 0 0)', opacity:1, duration:0.8, stagger:0.06, ease:'power3.inOut' });
  }

  function renderDriveLinks() {
    const el = document.getElementById('driveLinks');
    // Group photos by event+side
    const groups = {};
    const photos = currentCluster.photos;
    photos.forEach(p => {
      const key = `${p.event}_${p.side}`;
      if (!groups[key]) groups[key] = { event:p.event, side:p.side, count:0 };
      groups[key].count++;
    });

    el.innerHTML = Object.values(groups).map(g => `
      <a href="event-gallery.html?event=${g.event}&side=${g.side}"
         class="group flex items-center justify-between px-5 py-3 rounded-xl bg-cream-200/40 border border-gold-400/10 hover:border-gold-400/30 transition">
        <div>
          <span class="font-ui text-[10px] text-burgundy-800 font-medium tracking-wider uppercase">${EVENT_NAMES[g.event]||g.event}</span>
          <span class="font-ui text-[9px] text-burgundy-700/40 ml-2">${g.side === 'girl' ? "Avleen's" : "Sharan's"} side &middot; ${g.count} photos</span>
        </div>
        <div class="flex items-center gap-1 text-gold-500/60 group-hover:text-gold-500 transition">
          <span class="font-ui text-[9px] tracking-wider uppercase">View All Photos</span>
          <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" class="group-hover:translate-x-0.5 transition-transform"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
        </div>
      </a>
    `).join('');
  }

  // ============================================================
  // LIGHTBOX
  // ============================================================
  let lbPhotos=[], lbIdx=0;

  function openLb(idx) {
    lbPhotos = currentCluster.photos.filter(p => p.thumb);
    lbIdx = idx;
    updateLb();
    const lb = document.getElementById('lightbox');
    lb.classList.remove('hidden'); lb.classList.add('flex');
    document.body.style.overflow = 'hidden';
    lenis.stop();
  }

  function closeLightbox(e) {
    if (e && e.target !== e.currentTarget) return;
    document.getElementById('lightbox').classList.add('hidden');
    document.getElementById('lightbox').classList.remove('flex');
    document.body.style.overflow = '';
    lenis.start();
  }

  function lightboxNav(d) { lbIdx=(lbIdx+d+lbPhotos.length)%lbPhotos.length; updateLb(); }

  function updateLb() {
    const p=lbPhotos[lbIdx], img=document.getElementById('lightboxImg');
    img.classList.remove('lb-enter'); img.style.opacity=0;
    setTimeout(()=>{ img.src=p.thumb; img.classList.add('lb-enter'); img.style.opacity=1; },80);
    document.getElementById('lightboxCounter').textContent=`${lbIdx+1} / ${lbPhotos.length}`;
    [-1,1].forEach(o=>{const i=(lbIdx+o+lbPhotos.length)%lbPhotos.length; new Image().src=lbPhotos[i].thumb;});
  }

  document.addEventListener('keydown',e=>{
    if(document.getElementById('lightbox').classList.contains('hidden'))return;
    if(e.key==='Escape')closeLightbox();
    if(e.key==='ArrowLeft')lightboxNav(-1);
    if(e.key==='ArrowRight')lightboxNav(1);
  });

  let tx=0;
  document.getElementById('lightbox').addEventListener('touchstart',e=>{tx=e.changedTouches[0].screenX;},{passive:true});
  document.getElementById('lightbox').addEventListener('touchend',e=>{const d=e.changedTouches[0].screenX-tx;if(Math.abs(d)>50)lightboxNav(d>0?-1:1);},{passive:true});

  // Back button
  window.addEventListener('popstate', e => {
    if (e.state?.view === 'grid' || !e.state) showGrid();
    else if (e.state?.view === 'person') showPerson(e.state.id);
  });

  // ============================================================
  // INIT
  // ============================================================
  // Animate header
  gsap.fromTo('#pageHeader', {y:30,opacity:0},{y:0,opacity:1,duration:1,ease:'power3.out',delay:0.2});

  loadData();
  </script>
</body>
</html>
